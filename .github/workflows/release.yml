name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            build-essential \
            cmake \
            git \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            lua5.4 \
            libssl-dev \
            zlib1g-dev \
            zip

      - name: Run unit tests
        run: make test-unit

      - name: Run end-to-end tests
        run: make test-e2e

      - name: Package plugin asset
        run: make package-release VERSION=${{ github.ref_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/folderlock.koplugin-${{ github.ref_name }}.zip
          generate_release_notes: true
