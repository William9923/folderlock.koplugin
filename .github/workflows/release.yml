name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies (e2e build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bash \
            build-essential \
            ca-certificates \
            cmake \
            gcc-multilib \
            gettext \
            git \
            libdbus-1-dev \
            libdecor-0-dev \
            libegl1-mesa-dev \
            libibus-1.0-dev \
            libtool \
            libtool-bin \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            meson \
            nasm \
            ninja-build \
            patch \
            perl \
            pkg-config \
            python3 \
            libssl-dev \
            unzip \
            wayland-protocols \
            wget \
            zlib1g-dev \
            zip

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v13
      - name: Install LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
      - name: Install dkjson
        run: sudo luarocks install dkjson

      - name: Run unit tests
        run: make test-unit

      - name: Run end-to-end tests
        run: make test-e2e

      - name: Package plugin asset
        run: make package-release VERSION=${{ github.ref_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/folderlock.koplugin-${{ github.ref_name }}.zip
            dist/folderlock.koplugin-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
