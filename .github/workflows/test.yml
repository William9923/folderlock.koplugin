name: Test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
      - name: Run unit tests
        run: make test-unit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bash \
            build-essential \
            ca-certificates \
            cmake \
            gcc-multilib \
            gettext \
            git \
            libtool \
            libtool-bin \
            meson \
            nasm \
            ninja-build \
            patch \
            perl \
            pkg-config \
            python3 \
            lua5.4 \
            libssl-dev \
            unzip \
            wget \
            zlib1g-dev

      - name: Compute KOReader cache key
        id: koreader-cache-key
        run: |
          echo "koreader_sha=$(cd vendor/koreader && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore KOReader base build cache
        id: koreader-build-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: vendor/koreader/base/build
          key: ${{ runner.os }}-koreader-base-build-${{ steps.koreader-cache-key.outputs.koreader_sha }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: |
            ${{ runner.os }}-koreader-base-build-${{ steps.koreader-cache-key.outputs.koreader_sha }}-

      - name: Run end-to-end tests
        run: make test-e2e

      - name: Save KOReader base build cache
        if: success() && steps.koreader-build-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/koreader/base/build
          key: ${{ steps.koreader-build-cache-restore.outputs.cache-primary-key }}
