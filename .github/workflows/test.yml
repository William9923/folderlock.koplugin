name: Test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
      - name: Run unit tests
        run: make test-unit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bash \
            build-essential \
            ca-certificates \
            cmake \
            gcc-multilib \
            gettext \
            git \
            libtool \
            libtool-bin \
            meson \
            nasm \
            ninja-build \
            patch \
            perl \
            pkg-config \
            python3 \
            lua5.4 \
            libssl-dev \
            unzip \
            wget \
            zlib1g-dev

      - name: Run end-to-end tests
        run: make test-e2e
