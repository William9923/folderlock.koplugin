name: Test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
      - name: Run unit tests
        run: sh tests/run_unit.sh

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            build-essential \
            cmake \
            git \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            lua5.4 \
            libssl-dev \
            zlib1g-dev

      - name: Run end-to-end tests
        run: sh tests/run_e2e.sh
